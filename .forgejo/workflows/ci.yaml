name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:

env:
  SPHINX_DEFAULT_DOC_VERSION: "master"
  TYPOS_UPSTREAM: "https://github.com/crate-ci/typos/releases/download/v1.44.0/typos-v1.44.0-x86_64-unknown-linux-musl.tar.gz"
  CODECOV_CLI_UPSTREAM: "https://cli.codecov.io/latest/alpine/codecov"

jobs:
  sync-mirrors:
    runs-on: docker
    container: node:25-alpine
    if: forgejo.ref_name == 'master'
    continue-on-error: true

    steps:
      - name: Install utilities
        run: apk add --no-cache git openssh

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "-----BEGIN OPENSSH PRIVATE KEY-----" > ~/.ssh/privatekey
          echo "${{ secrets.GIT_ACCESS_KEY }}" >> ~/.ssh/privatekey
          echo "-----END OPENSSH PRIVATE KEY-----" >> ~/.ssh/privatekey
          chmod 600 ~/.ssh/privatekey

      - name: Add known hosts
        run: |
          ssh-keyscan git.maxrdz.com >> ~/.ssh/known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts

      - name: Push to mirrors
        run: |
          git clone --mirror ${{ github.server_url }}/${{ github.repository }} repo.git
          cd repo.git
          ssh-agent sh -c 'ssh-add ~/.ssh/privatekey; git push -v --mirror git@github.com:donet-server/donet'
          ssh-agent sh -c 'ssh-add ~/.ssh/privatekey; git push --all git@gitlab.com:donet-server/donet'

  commit-validation:
    runs-on: docker
    container: node:25-alpine
    needs: sync-mirrors
    steps:
      - name: actions/checkout@v6
        uses: https://git.maxrdz.com/actions/checkout@v6

      - name: Install Python3
        run: apk add --no-cache python3 py3-pip git

      - name: Validate Commit
        run: python build-aux/validate-commit.py "${{ github.event.head_commit.message || github.event.commits[0].message }}"

  typos:
    runs-on: docker
    container: node:25-alpine
    needs: sync-mirrors
    steps:
      - name: actions/checkout@v6
        uses: https://git.maxrdz.com/actions/checkout@v6

      - name: Install Typos binary
        run: |
          apk add --no-cache wget tar
          wget ${TYPOS_UPSTREAM}
          mkdir .tmp
          tar -xzf typos-v*.tar.gz -C .tmp/

      - name: Run Typos
        run: ./.tmp/typos

  cargo-fmt:
    runs-on: docker
    container: rust:slim
    needs: sync-mirrors
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y nodejs

      - name: actions/checkout@v6
        uses: https://git.maxrdz.com/actions/checkout@v6

      - name: Check for any updated Rust files
        id: changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ forgejo.sha }} | grep '\.rs$'; then
            echo "proceed=true" >> ${{ forgejo.output }};
          else
            echo "proceed=false" >> ${{ forgejo.output }};
          fi

      - name: Run rustfmt
        if: steps.changes.outputs.proceed == 'true'
        run: |
          rustup component add rustfmt
          echo "" >> donet-daemon/src/meson.rs
          rustc -Vv && cargo -Vv
          cargo fmt --version
          cargo fmt --all -- --color=always --check

  cargo-deny:
    runs-on: docker
    container: ubuntu:latest
    continue-on-error: true
    needs: sync-mirrors
    steps:
      - name: Setup NodeJS for actions/checkout
        run: |
          apt-get update
          apt-get install -y nodejs

      - name: actions/checkout@v6
        uses: https://git.maxrdz.com/actions/checkout@v6

      - name: Check if we need to run cargo-deny
        id: changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ forgejo.sha }} | grep -E '(build\.rs$|Cargo\.toml$|Cargo\.lock$|deny\.toml$)'; then
            echo "proceed=true" >> ${{ forgejo.output }};
          else
            echo "proceed=false" >> ${{ forgejo.output }};
          fi

      - name: Install dependencies
        if: steps.changes.outputs.proceed == 'true'
        run: |
          apt-get install -y git meson rustup pkg-config python3 python3-venv libssl-dev openssl

      - name: Setup Rust toolchain
        if: steps.changes.outputs.proceed == 'true'
        run: |
          rustup default stable
          rustup component add clippy rustfmt

      - name: Restore Meson build cache
        if: steps.changes.outputs.proceed == 'true'
        uses: https://git.maxrdz.com/actions/cache/restore@v5
        with:
          path: build
          key: meson-cache-deny-${{ forgejo.ref_name }}

      - name: Run Cargo deny
        if: steps.changes.outputs.proceed == 'true'
        run: |
          meson setup build -Dprofile=debug
          meson compile deny -C build

      - name: Save Meson build cache
        if: steps.changes.outputs.proceed == 'true'
        uses: https://git.maxrdz.com/actions/cache/save@v5
        with:
          path: build
          key: meson-cache-deny-${{ forgejo.ref_name }}

  build:
    runs-on: docker
    container: ubuntu:latest
    needs: [cargo-fmt, typos]
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git meson nodejs rustup pkg-config python3 python3-venv
          apt-get install -y libssl-dev openssl

      - name: Setup Rust toolchain
        run: |
          rustup default stable
          rustup component add clippy rustfmt

      - name: actions/checkout@v6
        uses: https://git.maxrdz.com/actions/checkout@v6

      - name: Restore Meson build cache
        uses: https://git.maxrdz.com/actions/cache/restore@v5
        with:
          path: build
          key: meson-cache-build-${{ forgejo.ref_name }}

      - name: Meson build
        run: |
          meson setup build -Dprofile=debug
          meson compile -C build
          meson compile linting -C build

      - name: Save Meson build cache
        uses: https://git.maxrdz.com/actions/cache/save@v5
        with:
          path: build
          key: meson-cache-build-${{ forgejo.ref_name }}

  testing:
    runs-on: docker
    container: ubuntu:latest
    needs: build
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git meson nodejs rustup pkg-config python3 python3-venv
          apt-get install -y libssl-dev openssl

      - name: Setup Rust toolchain
        run: rustup default stable

      - name: actions/checkout@v6
        uses: https://git.maxrdz.com/actions/checkout@v6

      - name: Run tests
        run: |
          meson setup build -Dprofile=debug
          meson compile tests -C build

      - name: actions/upload-artifact@v3
        uses: https://git.maxrdz.com/actions/upload-artifact@v3
        with:
          name: test-build
          path: build
          retention-days: 7

  documentation:
    runs-on: docker
    container: ubuntu:latest
    needs: build
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git meson nodejs rustup pkg-config python3 python3-venv
          apt-get install -y libssl-dev openssl

          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install -r docs/requirements.txt

      - name: actions/checkout@v6
        uses: https://git.maxrdz.com/actions/checkout@v6

      - name: Restore Meson build cache
        uses: https://git.maxrdz.com/actions/cache/restore@v5
        with:
          path: build
          key: meson-cache-doc-${{ forgejo.ref_name }}

      - name: Build Sphinx / cargo-doc documentation
        run: |
          meson setup build -Dprofile=debug -Dci_branch=${{ forgejo.ref_name }}
          meson compile sphinx -C build
          meson compile cargo-doc -C build

          mkdir doc
          cp -r build/sphinx/* doc
          cp -r build/target/doc/* doc
          chmod -R a=rwx doc

      - name: Save Meson build cache
        uses: https://git.maxrdz.com/actions/cache/save@v5
        with:
          path: build
          key: meson-cache-doc-${{ forgejo.ref_name }}

      - name: actions/upload-artifact@v3
        uses: https://git.maxrdz.com/actions/upload-artifact@v3
        with:
          name: project-documentation
          path: doc
          retention-days: 7

  cargo-tarpaulin:
    runs-on: docker
    container: ubuntu:latest
    needs: testing
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git meson nodejs rustup pkg-config python3 python3-venv
          apt-get install -y libssl-dev openssl

      - name: Setup Rust toolchain
        run: rustup default stable

      - name: actions/checkout@v6
        uses: https://git.maxrdz.com/actions/checkout@v6

      - name: actions/download-artifact@v3
        uses: https://git.maxrdz.com/actions/download-artifact@v3
        with:
          name: test-build
          path: build

      - name: Run code coverage
        run: |
          meson compile code-coverage -C build

          mkdir tarpaulin
          chmod -R a=rwx tarpaulin
          cp -r build/target/tarpaulin tarpaulin

      - name: actions/upload-artifact@v3
        uses: https://git.maxrdz.com/actions/upload-artifact@v3
        with:
          name: code-coverage
          path: tarpaulin
          retention-days: 7

  codecov-upload:
    runs-on: docker
    container: node:25-alpine
    needs: cargo-tarpaulin
    if: forgejo.ref_name == 'master'
    continue-on-error: true
    steps:
      - name: actions/download-artifact@v3
        uses: https://git.maxrdz.com/actions/download-artifact@v3
        with:
          name: code-coverage
          path: tarpaulin

      - name: Install GPG
        run: apk add --no-cache curl gnupg

      - name: Download Codecov binary
        run: curl -O ${CODECOV_CLI_UPSTREAM}

      - name: Verify download
        run: |
          curl https://keybase.io/codecovsecurity/pgp_keys.asc | gpg --no-default-keyring --keyring trustedkeys.gpg --import
          gpg --keyring trustedkeys.gpg --list-keys

          curl -O ${CODECOV_CLI_UPSTREAM}.SHA256SUM
          curl -O ${CODECOV_CLI_UPSTREAM}.SHA256SUM.sig
          gpg --verify codecov.SHA256SUM.sig codecov.SHA256SUM

          sha256sum -c codecov.SHA256SUM
          chmod +x codecov
          ./codecov --version

      - name: Upload coverage files
        run: ./codecov -v upload-process --dir tarpaulin --git-service github_enterprise -t ${{ secrets.CODECOV_TOKEN }}
